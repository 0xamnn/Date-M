<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Request ❤️</title>

<style>

body{
    margin:0;
    overflow:hidden;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    font-family:Arial,sans-serif;
    text-align:center;

    background:linear-gradient(
        180deg,
        #ffb6c1 0%,
        #ffc0cb 40%,
        #ffd6de 100%
    );

    position:relative;
}

img,
h1,
.buttons{
    position:relative;
    z-index:10;
}

img{
    width:180px;
    margin-bottom:20px;
}

h1{
    color:white;
    font-size:48px;
    margin-bottom:30px;
    text-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.buttons{
    display:flex;
    gap:30px;
    align-items:center;
}

button{
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

#yesBtn{
    background:#4CAF50;
    font-size:24px;
    padding:15px 40px;
}

#noBtn{
    background:#E53935;
    font-size:18px;
    padding:15px 25px;
}

.heart{
    position:absolute;
    bottom:-50px;
    color:rgba(255,80,120,0.4);
    pointer-events:none;
    animation:floatUp linear infinite;
}

@keyframes floatUp{

    from{
        transform:translateY(0);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

</style>

</head>

<body>

<img src="https://media.tenor.com/4f4KX0vP6K0AAAAi/bear-love.gif">

<h1>Manyaaa, Will you go on a date with me? 🥺❤️</h1>

<div class="buttons">
    <button id="yesBtn">Yes 😍</button>
    <button id="noBtn">No 😭</button>
</div>

<script>

const noMessages = [
    "Are you sure? 🥺",
    "Wut if i gift u a Diet Coke? 🥤",
    "Pretty please 👉👈",
    "Unlimited breads 😂",
    "Free ice cream 🍦",
    "I'll buy u a Boba Tea 🧋",
    "Manyaaaa 😭",
    "Foxyyyy 🥺",
    "Okieee, wut bout momos? 🥟",
    "Still no? 😔",
    "You're breaking my heart 💔",
    "Last chance 😭",
    "Please? 🥹"
];

let clickCount = 0;

let yesFontSize = 24;
let yesPaddingX = 40;
let yesPaddingY = 15;

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("click", () => {

    yesFontSize += 2;
    yesPaddingX += 5;
    yesPaddingY += 2;

    yesBtn.style.fontSize = yesFontSize + "px";
    yesBtn.style.padding =
        yesPaddingY + "px " +
        yesPaddingX + "px";

    if(clickCount < noMessages.length){
        noBtn.textContent = noMessages[clickCount];
    }

    let noScale = Math.max(0.6, 1 - (clickCount * 0.03));
    noBtn.style.transform = `scale(${noScale})`;

    clickCount++;

    if(clickCount > 15){
        noBtn.style.display = "none";
    }
});

yesBtn.addEventListener("click", () => {

    document.body.innerHTML = `
        <img src="https://media.tenor.com/3dM5QYg7l7QAAAAi/bear-kiss.gif" width="220">

        <h1 style="color:#ff4081;">
            YAYYYYY ❤️🎉
        </h1>

        <h2>
            It's a date 😎☕🍕
        </h2>
    `;
});

function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";

    heart.style.fontSize =
        (Math.random()*25 + 15) + "px";

    heart.style.animationDuration =
        (Math.random()*6 + 6) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },12000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
